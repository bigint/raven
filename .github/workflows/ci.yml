name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: npx biome ci .

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  lint-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: apps/api-py
        run: uv sync --frozen

      - name: Lint
        working-directory: apps/api-py
        run: uv run ruff check src/

      - name: Format check
        working-directory: apps/api-py
        run: uv run ruff format --check src/
