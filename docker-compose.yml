services:
  gateway:
    build: .
    ports:
      - '8080:8080'
    environment:
      - RAVEN_ADMIN_KEY=${RAVEN_ADMIN_KEY:-raven-admin-key}
      - RAVEN_STORE_DRIVER=postgres
      - DATABASE_URL=postgres://raven:raven@postgres:5432/raven?sslmode=disable
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: raven
      POSTGRES_PASSWORD: raven
      POSTGRES_DB: raven
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U raven']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
