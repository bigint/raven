services:
  raven:
    image: yoginth/raven:latest
    ports:
      - "3000:3000"
      - "4000:4000"
    environment:
      BIGRAG_API_SECRET: ${BIGRAG_API_SECRET:-raven-bigrag-secret}
      BIGRAG_URL: http://bigrag:6100
    volumes:
      - raven_data:/var/lib/postgresql/data
    depends_on:
      bigrag:
        condition: service_healthy
    restart: unless-stopped

  bigrag:
    image: yoginth/bigrag:latest
    ports:
      - "6100:6100"
    environment:
      BIGRAG_API_SECRET: ${BIGRAG_API_SECRET:-raven-bigrag-secret}
      BIGRAG_DATABASE_URL: postgres://raven:raven@postgres:5432/bigrag?sslmode=disable
      BIGRAG_MILVUS_URI: http://milvus:19530
      BIGRAG_REDIS_URL: redis://redis:6379/0
      BIGRAG_UPLOAD_DIR: /data/uploads
    volumes:
      - bigrag_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: raven
      POSTGRES_PASSWORD: raven
      POSTGRES_USER: raven
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raven"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "2147483648"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
    volumes:
      - milvus_data:/var/lib/milvus
      - ./milvus.yaml:/milvus/configs/user.yaml:ro
    depends_on:
      milvus-etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

volumes:
  bigrag_data:
  etcd_data:
  milvus_data:
  postgres_data:
  raven_data:
  redis_data:
