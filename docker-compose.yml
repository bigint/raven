services:
  raven:
    image: yoginth/raven:latest
    ports:
      - "3000:3000"
      - "4000:4000"
    environment:
      BIGRAG_URL: http://bigrag:8080
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  bigrag:
    image: bigrag/bigrag:latest
    ports:
      - "8080:8080"
    environment:
      BIGRAG_AUTH_REQUIRED: "false"
      BIGRAG_DATABASE_URL: postgresql://bigrag:bigrag@bigrag-postgres:5432/bigrag
      BIGRAG_MILVUS_URI: http://milvus:19530
      BIGRAG_REDIS_URL: redis://bigrag-redis:6379/0
    depends_on:
      - bigrag-postgres
      - milvus
      - bigrag-redis
    restart: unless-stopped

  bigrag-postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: bigrag
      POSTGRES_PASSWORD: bigrag
      POSTGRES_USER: bigrag
    volumes:
      - bigrag_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:latest
    volumes:
      - milvus_data:/var/lib/milvus
    restart: unless-stopped

  bigrag-redis:
    image: redis:7-alpine
    volumes:
      - bigrag_redis_data:/data
    restart: unless-stopped

volumes:
  bigrag_postgres_data:
  bigrag_redis_data:
  milvus_data:
  postgres_data:
