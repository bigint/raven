server:
  host: 0.0.0.0
  port: 8080

admin:
  api_key: raven-dev-admin-key
  dashboard:
    enabled: true

store:
  driver: sqlite
  sqlite:
    path: ./raven.db

# Provider API keys are managed via the dashboard UI (Admin API /admin/v1/providers).

cache:
  enabled: true
  exact:
    enabled: true
    max_entries: 1000
    ttl: 1h
  semantic:
    enabled: false

rate_limit:
  enabled: true
  global:
    rpm: 1000
    tpm: 100000

routing:
  strategy: single
  health_check_interval: 30s
  circuit_breaker:
    failure_threshold: 5
    reset_timeout: 60s

observability:
  logs:
    level: info
    format: json
    request_body: false
  metrics:
    enabled: true
    path: /metrics
  traces:
    enabled: false

guardrails:
  enabled: false

plugins: []

privacy:
  telemetry: false
  request_logging: true
  log_request_bodies: false
  anonymize_logs_after: 30d
