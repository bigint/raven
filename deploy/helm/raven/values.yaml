replicaCount: 2

api:
  image:
    repository: raven-api
    tag: latest
    pullPolicy: IfNotPresent
  port: 3001
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    - name: API_PORT
      value: "3001"

web:
  image:
    repository: raven-web
    tag: latest
    pullPolicy: IfNotPresent
  port: 3000

postgresql:
  enabled: true
  auth:
    username: raven
    password: raven
    database: raven

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: raven.local
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
